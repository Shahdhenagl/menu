<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مريديان — المنيو</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --gold:#d4af37;
    --gold-light:#f3e5ab;
    --gold-dark:#aa8410;
    --bg:#070707;
    --card:#111114;
    --card2:#16161a;
    --line:#26262c;
    --muted:#9a9aa2;
    --text:#f2f2f0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1200px 600px at 50% -200px, rgba(212,175,55,.10), transparent 70%);
    min-height:100vh;
  }
  .wrap{max-width:1200px;margin:0 auto;padding:0 18px 60px}

  /* Header */
  header{text-align:center;padding:56px 16px 30px}
  .logo-ring{
    width:120px;height:120px;margin:0 auto 20px;border-radius:50%;
    overflow:hidden;position:relative;
    box-shadow:0 0 0 1px rgba(212,175,55,.45), 0 0 34px rgba(212,175,55,.4);
    animation:logoGlow 3s ease-in-out infinite;
  }
  .logo-ring img{width:100%;height:100%;object-fit:cover;display:block}
  .logo-ring::after{
    content:"";position:absolute;top:0;left:-160%;width:65%;height:100%;
    background:linear-gradient(115deg,transparent,rgba(255,255,255,.42),transparent);
    transform:skewX(-20deg);pointer-events:none;
    animation:logoShine 5s ease-in-out infinite;
  }
  @keyframes logoGlow{
    0%,100%{box-shadow:0 0 0 1px rgba(212,175,55,.35), 0 0 22px rgba(212,175,55,.25)}
    50%{box-shadow:0 0 0 1px rgba(212,175,55,.65), 0 0 44px rgba(212,175,55,.58)}
  }
  @keyframes logoShine{
    0%{left:-160%} 24%{left:170%} 100%{left:170%}
  }
  h1{
    font-size:clamp(2rem,6vw,3.2rem);font-weight:900;letter-spacing:1px;
    background:linear-gradient(90deg,var(--gold-light),var(--gold),var(--gold-dark));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .subtitle{color:var(--muted);margin-top:8px;font-size:1rem;letter-spacing:2px}
  .divider{
    width:120px;height:2px;margin:22px auto 0;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }

  /* Category nav */
  .topbar{
    position:sticky;top:0;z-index:25;
    background:rgba(7,7,7,.95);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);margin-bottom:32px;
  }
  .tabs{display:flex;justify-content:center;gap:10px;padding:12px 14px 8px}
  .tabs button{
    flex:0 0 auto;min-width:128px;font-family:inherit;font-size:1rem;font-weight:800;
    cursor:pointer;color:var(--muted);background:var(--card);
    border:1.5px solid var(--line);border-radius:999px;padding:10px 22px;transition:.2s;
  }
  .tabs button:hover{border-color:var(--gold);color:var(--text)}
  .tabs button.active{
    color:#1a1400;background:linear-gradient(180deg,var(--gold-light),var(--gold));
    border-color:var(--gold);box-shadow:0 4px 16px rgba(212,175,55,.4);
  }
  nav{
    display:flex;gap:9px;overflow-x:auto;overflow-y:hidden;
    padding:4px 14px 12px;
    scrollbar-width:thin;scrollbar-color:var(--gold-dark) transparent;
    -webkit-overflow-scrolling:touch;
  }
  nav::-webkit-scrollbar{height:6px}
  nav::-webkit-scrollbar-track{background:transparent}
  nav::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:10px}
  nav a{
    flex:0 0 auto;color:var(--muted);text-decoration:none;font-weight:700;font-size:.92rem;
    padding:8px 17px;border:1px solid var(--line);border-radius:999px;white-space:nowrap;
    background:var(--card);transition:.2s;
  }
  nav a:hover{color:var(--text);border-color:var(--gold)}
  nav a.active{
    color:#1a1400;
    background:linear-gradient(180deg,var(--gold-light),var(--gold));
    border-color:var(--gold);font-weight:800;
    box-shadow:0 4px 16px rgba(212,175,55,.4);
  }

  /* Main section banner (المطبخ / البار) */
  .section-head{
    display:flex;align-items:center;gap:16px;
    max-width:1200px;margin:8px auto 28px;padding:0 18px;scroll-margin-top:112px;
  }
  .section-head .rule{flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--gold-dark),transparent)}
  .section-head h2{
    text-align:center;font-size:2rem;font-weight:900;letter-spacing:3px;white-space:nowrap;
    background:linear-gradient(90deg,var(--gold-light),var(--gold),var(--gold-dark));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .section-head h2 .en{
    display:block;font-size:.72rem;letter-spacing:4px;color:var(--muted);
    -webkit-text-fill-color:var(--muted);font-weight:600;margin-top:4px;text-align:center;
  }
  .soon{
    max-width:1200px;margin:0 18px 46px;padding:34px 18px;text-align:center;
    color:var(--muted);border:1px dashed var(--line);border-radius:16px;font-weight:600;
  }
  @media(min-width:1236px){ .soon{margin-inline:auto} }

  /* Category section */
  .cat{margin-bottom:46px;scroll-margin-top:104px}
  .cat-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .cat-head h2{
    font-size:1.6rem;font-weight:800;color:var(--gold);white-space:nowrap;
  }
  .cat-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dark),transparent)}
  .cat-head .count{color:var(--muted);font-size:.85rem;font-weight:600}

  /* Grid */
  .grid{
    display:grid;gap:12px;
    grid-template-columns:repeat(2,1fr);
  }
  @media(min-width:560px){ .grid{ grid-template-columns:repeat(3,1fr) } }
  @media(min-width:820px){ .grid{ grid-template-columns:repeat(4,1fr);gap:16px } }
  @media(min-width:1120px){ .grid{ grid-template-columns:repeat(5,1fr) } }
  .card{
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:16px;overflow:hidden;
    transition:transform .18s, border-color .18s, box-shadow .18s;
    display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-4px);border-color:rgba(212,175,55,.55);
    box-shadow:0 14px 30px rgba(0,0,0,.5)}
  .thumb{
    position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;
    background:
      linear-gradient(135deg,#1c1c22,#0d0d10);
    display:flex;align-items:center;justify-content:center;
  }
  .thumb::after{content:"🍽";font-size:38px;opacity:.25;position:absolute}
  .thumb img{
    position:relative;z-index:1;width:100%;height:100%;object-fit:cover;
    display:block;background:#0d0d10;
  }
  .thumb img.hide{display:none}
  .body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:5px;flex:1}
  .name-ar{font-size:1.05rem;font-weight:700;line-height:1.35}
  .name-en{font-size:.82rem;color:var(--muted);font-weight:400;letter-spacing:.3px}
  .price{
    margin-top:auto;padding-top:10px;display:flex;align-items:baseline;gap:5px;
  }
  .price .num{color:var(--gold);font-weight:800;font-size:1.3rem}
  .price .cur{color:var(--muted);font-size:.8rem;font-weight:600}

  footer{text-align:center;color:var(--muted);font-size:.85rem;padding:40px 16px 10px;border-top:1px solid var(--line);margin-top:20px}
  footer .g{color:var(--gold)}

  /* Mobile polish */
  @media(max-width:559px){
    .wrap{padding:0 12px 40px}
    header{padding:34px 14px 20px}
    .logo-ring{width:96px;height:96px;margin-bottom:14px}
    h1{font-size:2rem}
    .subtitle{font-size:.85rem;margin-top:6px}
    .divider{margin-top:16px}
    nav{padding:11px 12px}
    nav a{font-size:.84rem;padding:7px 14px}
    .cat{margin-bottom:34px}
    .cat-head{gap:10px;margin-bottom:16px}
    .cat-head h2{font-size:1.2rem}
    .section-head{gap:10px;margin-bottom:20px}
    .section-head h2{font-size:1.5rem;letter-spacing:2px}
    .tabs{padding:10px 12px 6px;gap:8px}
    .tabs button{min-width:0;flex:1 1 0;font-size:.92rem;padding:9px 10px}
    .cat-head .count{font-size:.72rem}
    .card{border-radius:13px}
    .body{padding:10px 11px 12px;gap:3px}
    .name-ar{font-size:.9rem;line-height:1.3}
    .name-en{font-size:.7rem}
    .price{padding-top:7px}
    .price .num{font-size:1.05rem}
    .thumb::after{font-size:30px}
  }
</style>
</head>

/* ---- صور بديلة حسب التصنيف (تظهر مكان أي صورة مش متاحة) ---- */
const FBQ = '?w=500&q=72&auto=format&fit=crop';
const FALLBACK = {
  box:      'https://images.unsplash.com/photo-1533089860892-a7c6f0a88666'+FBQ,
  salad:    'https://images.unsplash.com/photo-1512621776951-a57141f2eefd'+FBQ,
  soup:     'https://images.unsplash.com/photo-1547592166-23ac45744acd'+FBQ,
  tagine:   'https://images.unsplash.com/photo-1585937421612-70a008356fbe'+FBQ,
  meals:    'https://images.unsplash.com/photo-1544025162-d76694265947'+FBQ,
  grills:   'https://images.unsplash.com/photo-1544025162-d76694265947'+FBQ,
  pasta:    'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9'+FBQ,
  sides:    'https://images.unsplash.com/photo-1551504734-5ee1c4a1479b'+FBQ,
  burgers:  'https://images.unsplash.com/photo-1568901346375-23c9450c58cd'+FBQ,
  pizza:    'https://images.unsplash.com/photo-1513104890138-7c749659a591'+FBQ,
  sandwich: 'https://images.unsplash.com/photo-1528735602780-2552fd46c7af'+FBQ,
  kids:     'https://images.unsplash.com/photo-1571091718767-18b5b1457add'+FBQ,
};
function fb(el){
  const f = el.getAttribute('data-fb');
  if (f && !el.dataset.done){ el.dataset.done='1'; el.src=f; }
  else { el.classList.add('hide'); }
}

/* ---- render ---- */
const nav = document.getElementById('nav');
const menu = document.getElementById('menu');

const navLinks = {};
const sections = [];

function renderCategory(cat){
  const items = PRODUCTS.filter(p=>p.c===cat.id);
  if(!items.length) return;

  const a = document.createElement('a');
  a.href = '#cat-'+cat.id;
  a.textContent = cat.ar;
  a.dataset.cat = cat.id;
  navLinks[cat.id] = a;
  nav.appendChild(a);

  const sec = document.createElement('section');
  sec.className = 'cat';
  sec.id = 'cat-'+cat.id;

  const head = document.createElement('div');
  head.className = 'cat-head';
  head.innerHTML = '<h2>'+cat.ar+'</h2><span class="line"></span><span class="count">'+items.length+' صنف</span>';
  sec.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(p=>{
    const card = document.createElement('div');
    card.className = 'card';
    const fallback = FALLBACK[p.c] || '';
    const imgTag = '<img src="'+(p.img||fallback)+'" data-fb="'+fallback+'" alt="'+p.ar+'" loading="lazy" onerror="fb(this)" />';
    card.innerHTML =
      '<div class="thumb">'+imgTag+'</div>'+
      '<div class="body">'+
        '<div class="name-ar">'+p.ar+'</div>'+
        '<div class="name-en">'+p.en+'</div>'+
        '<div class="price"><span class="num">'+p.p+'</span><span class="cur">ج.م</span></div>'+
      '</div>';
    grid.appendChild(card);
  });
  sec.appendChild(grid);
  menu.appendChild(sec);
  sections.push(sec);
}

/* رندر بالأقسام الرئيسية: المطبخ ثم البار */
SECTIONS.forEach(section=>{
  const secCats = CATS.filter(c=>c.s===section.id);

  const banner = document.createElement('div');
  banner.className = 'section-head';
  banner.id = 'sec-'+section.id;
  banner.innerHTML = '<span class="rule"></span><h2>'+section.ar+'<span class="en">'+section.en+'</span></h2><span class="rule"></span>';
  menu.appendChild(banner);

  if(!secCats.length){
    const soon = document.createElement('div');
    soon.className = 'soon';
    soon.textContent = '🍹 قسم '+section.ar+' — قريبًا';
    menu.appendChild(soon);
    return;
  }
  secCats.forEach(renderCategory);
});

/* ---- تظليل التصنيف المفتوح + تحريك الشريط معاه ---- */
let activeId = null;
function setActive(id){
  if(id===activeId) return;
  activeId = id;
  for(const k in navLinks) navLinks[k].classList.toggle('active', k===id);
  const a = navLinks[id];
  if(a) a.scrollIntoView({block:'nearest', inline:'center', behavior:'smooth'});
}
const spy = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting) setActive(e.target.id.replace('cat-','')); });
}, { rootMargin:'-42% 0px -52% 0px', threshold:0 });
sections.forEach(s=>spy.observe(s));
if(sections[0]) setActive(sections[0].id.replace('cat-',''));

/* ضغطة على تصنيف = تظليله فورًا */
nav.addEventListener('click', e=>{
  const a = e.target.closest('a');
  if(a && a.dataset.cat) setActive(a.dataset.cat);
});

/* ---- تابات الأقسام الرئيسية (المطبخ / البار) ---- */
const tabsEl = document.getElementById('tabs');
const tabBtns = {};
SECTIONS.forEach(section=>{
  const b = document.createElement('button');
  b.textContent = section.ar;
  b.dataset.sec = section.id;
  b.addEventListener('click', ()=>{
    const banner = document.getElementById('sec-'+section.id);
    if(banner) banner.scrollIntoView({behavior:'smooth', block:'start'});
    setTab(section.id);
  });
  tabBtns[section.id] = b;
  tabsEl.appendChild(b);
});
function setTab(id){
  for(const k in tabBtns) tabBtns[k].classList.toggle('active', k===id);
}
setTab(SECTIONS[0].id);

/* التاب بيتظلّل حسب القسم اللي في العرض أثناء الاسكرول */
const secSpy = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting) setTab(e.target.id.replace('sec-','')); });
}, { rootMargin:'0px 0px -76% 0px', threshold:0 });
document.querySelectorAll('.section-head').forEach(el=>secSpy.observe(el));
</script>
